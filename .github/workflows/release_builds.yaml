name: release_builds

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0

      - run: make net
      - run: zig build release_builds --prefix dist

      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete pre-release-builds --yes --cleanup-tag || true
          gh release create pre-release-builds \
            --target "${GITHUB_SHA}" \
            --title "pre release builds" \
            --prerelease \
            dist/bin/*
